# Shikki (四季) — Dev OS Workspace
# Docker Compose — full local stack
#
# Usage:
#   cp .env.example .env   # edit credentials
#   docker compose up -d
#   open http://localhost:5174
#
# Requirements: Docker Desktop 4.x+, ~2GB RAM, ~2GB disk

name: shikki

services:
  db:
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-shikki}
      POSTGRES_USER:     ${POSTGRES_USER:-shikki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./src/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shikki} -d ${POSTGRES_DB:-shikki}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb
    deploy:
      resources:
        limits:
          memory: 1G

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11435:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL:     postgres://${POSTGRES_USER:-shikki}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-shikki}
      OLLAMA_URL:       http://ollama:11434
      EMBED_MODEL:      nomic-embed-text
      WS_PORT:          "3900"
      SHIKKI_API_KEY:    ${SHIKI_API_KEY:-}
      NODE_ENV:         ${NODE_ENV:-development}
      LOG_LEVEL:        ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3900:3900"
    healthcheck:
      test: ["CMD", "deno", "eval", "const r = await fetch('http://localhost:3900/health'); if (!r.ok) Deno.exit(1);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_WS_URL:    ws://localhost:3900
      VITE_API_URL:   http://localhost:3900
    ports:
      - "127.0.0.1:5174:5174"
    volumes:
      - ./src/frontend:/app:ro
      - /app/node_modules

  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve --config /etc/ntfy/server.yml
    volumes:
      - ntfy_data:/var/lib/ntfy
      - ./src/ntfy/server.yml:/etc/ntfy/server.yml:ro
    ports:
      - "0.0.0.0:2586:2586"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:2586/v1/health -O - | grep -q healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  db_data:
    driver: local
  ollama_data:
    driver: local
  ntfy_data:
    driver: local
