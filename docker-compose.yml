# ACC v3 — Agency Command Center
# Docker Compose — full local stack
#
# Usage:
#   cp .env.example .env   # edit credentials
#   docker compose up -d
#   open http://localhost:5174
#
# Requirements: Docker Desktop 4.x+, ~2GB RAM, ~2GB disk

name: acc-v3

services:
  db:
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-acc}
      POSTGRES_USER:     ${POSTGRES_USER:-acc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acc} -d ${POSTGRES_DB:-acc}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb
    deploy:
      resources:
        limits:
          memory: 1G

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11435:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL:     postgres://${POSTGRES_USER:-acc}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-acc}
      OLLAMA_URL:       http://ollama:11434
      EMBED_MODEL:      nomic-embed-text
      WS_PORT:          "3900"
      ACC_API_KEY:      ${ACC_API_KEY:-}
      NODE_ENV:         ${NODE_ENV:-development}
      LOG_LEVEL:        ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3900:3900"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3900/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./backend:/app:ro
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_WS_URL:    ws://localhost:3900
      VITE_API_URL:   http://localhost:3900
    ports:
      - "127.0.0.1:5174:5174"
    volumes:
      - ./frontend:/app:ro
      - /app/node_modules

volumes:
  db_data:
    driver: local
  ollama_data:
    driver: local
