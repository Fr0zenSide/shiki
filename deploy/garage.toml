# Garage S3 v2 — Local Development Configuration
# Single-node setup for docker compose dev stack
#
# Docs: https://garagehq.deuxfleurs.fr/documentation/reference-manual/configuration/

metadata_dir = "/var/lib/garage/meta"
data_dir     = "/var/lib/garage/data"
db_engine    = "sqlite"

replication_factor = 1
consistency_mode   = "consistent"

rpc_bind_addr = "0.0.0.0:3901"
# WARNING: Dev-only placeholder. Production secret is deployed out-of-band via ansible/secrets.
rpc_secret    = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

[s3_api]
api_bind_addr = "0.0.0.0:3902"
s3_region     = "garage"
root_domain   = ".s3.garage.localhost"

[s3_web]
bind_addr     = "0.0.0.0:3904"
root_domain   = ".web.garage.localhost"

[admin]
api_bind_addr = "0.0.0.0:3903"
admin_token   = "shiki-dev-admin-token"
metrics_token = "shiki-dev-metrics-token"
