openapi: 3.1.0
info:
  title: Shiki API
  version: 3.1.0
  description: >
    Shiki backend API — agent orchestration, knowledge management, pipelines,
    radar, and multi-company task queue. This spec is the migration contract
    for the Deno-to-Swift transition.
  contact:
    name: OBYW.one
  license:
    identifier: AGPL-3.0-only

servers:
  - url: http://localhost:3900
    description: Local development

# ─────────────────────────────────────────────────────────────────────────────
# Paths — 67 endpoints grouped by domain
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── Health ──────────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: getHealth
      summary: Basic health check
      tags: [Health]
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Database unreachable (degraded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/full:
    get:
      operationId: getHealthFull
      summary: Extended health with memory, pipeline, orchestrator stats and agent roster
      tags: [Health]
      responses:
        "200":
          description: Full health report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthFullResponse"
        "503":
          description: Degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthFullResponse"

  # ── Projects ────────────────────────────────────────────────────────────────

  /api/projects:
    get:
      operationId: listProjects
      summary: List all projects
      tags: [Projects]
      responses:
        "200":
          description: Array of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  # ── Sessions ────────────────────────────────────────────────────────────────

  /api/sessions:
    get:
      operationId: listSessions
      summary: List sessions (optionally filtered by project)
      tags: [Sessions]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of sessions (max 50)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /api/sessions/active:
    get:
      operationId: listActiveSessions
      summary: List active sessions ordered by hours active
      tags: [Sessions]
      responses:
        "200":
          description: Active sessions view
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveSession"

  # ── Agents ──────────────────────────────────────────────────────────────────

  /api/agents:
    get:
      operationId: listAgents
      summary: List agents (optionally filtered by session)
      tags: [Agents]
      parameters:
        - name: session_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of agents (max 100)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  # ── Agent Events ────────────────────────────────────────────────────────────

  /api/agent-update:
    post:
      operationId: createAgentEvent
      summary: Write an agent event and broadcast via WebSocket
      tags: [Agent Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentEventInput"
      responses:
        "200":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/agent-events:
    get:
      operationId: listAgentEvents
      summary: List agent events (optionally filtered by session)
      tags: [Agent Events]
      parameters:
        - name: session_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Array of agent events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentEvent"

  # ── Performance ─────────────────────────────────────────────────────────────

  /api/stats-update:
    post:
      operationId: createPerformanceMetric
      summary: Write a performance metric and broadcast via WebSocket
      tags: [Performance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerformanceMetricInput"
      responses:
        "200":
          description: Metric recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ── Memories ────────────────────────────────────────────────────────────────

  /api/memories:
    post:
      operationId: createMemory
      summary: Store a new memory (with optional embedding)
      tags: [Memories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryInput"
      responses:
        "200":
          description: Memory stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                required: [id]
        "400":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listMemories
      summary: List memories (optionally filtered by project)
      tags: [Memories]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Array of memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"

  /api/memories/search:
    post:
      operationId: searchMemories
      summary: Semantic search across memories (vector + BM25)
      tags: [Memories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemorySearchInput"
      responses:
        "200":
          description: Search results with similarity scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemorySearchResult"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/memories/sources:
    get:
      operationId: listMemorySources
      summary: List file-backed memory sources with chunk counts
      tags: [Memories]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of memory source aggregates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemorySource"

  # ── Chat Messages ──────────────────────────────────────────────────────────

  /api/chat-message:
    post:
      operationId: createChatMessage
      summary: Store a chat message and broadcast via WebSocket
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Message stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/chat-messages:
    get:
      operationId: listChatMessages
      summary: List chat messages for a session
      tags: [Chat]
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Array of chat messages ordered by time ASC
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
        "400":
          description: Missing session_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Data Sync ───────────────────────────────────────────────────────────────

  /api/data-sync:
    post:
      operationId: createDataSync
      summary: Generic data sync endpoint (stored as agent_event with type data_sync)
      tags: [Data Sync]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataSyncInput"
      responses:
        "200":
          description: Sync event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ── PR / Git Events ────────────────────────────────────────────────────────

  /api/pr-created:
    post:
      operationId: createPrEvent
      summary: Record a PR creation event
      tags: [Git Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrCreatedInput"
      responses:
        "200":
          description: PR event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/git-events:
    get:
      operationId: listGitEvents
      summary: List git events (filter by project and/or event type)
      tags: [Git Events]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: event_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Array of git events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitEvent"

  # ── Dashboard ───────────────────────────────────────────────────────────────

  /api/dashboard/summary:
    get:
      operationId: getDashboardSummary
      summary: Aggregate counts for the dashboard
      tags: [Dashboard]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dashboard summary counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /api/dashboard/performance:
    get:
      operationId: getDashboardPerformance
      summary: Daily performance buckets (tokens, cost, duration)
      tags: [Dashboard]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 7
      responses:
        "200":
          description: Time-series performance data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerformanceBucket"

  /api/dashboard/activity:
    get:
      operationId: getDashboardActivity
      summary: Hourly agent activity buckets
      tags: [Dashboard]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: hours
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
      responses:
        "200":
          description: Hourly activity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityBucket"

  /api/dashboard/costs:
    get:
      operationId: getDashboardCosts
      summary: Agent cost leaderboard
      tags: [Dashboard]
      responses:
        "200":
          description: Top 50 agents by cost
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostLeaderboardEntry"

  /api/dashboard/git:
    get:
      operationId: getDashboardGit
      summary: Daily git activity (additions, deletions, files changed)
      tags: [Dashboard]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 7
      responses:
        "200":
          description: Daily git activity buckets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitActivityBucket"

  # ── Ingestion ───────────────────────────────────────────────────────────────

  /api/ingest:
    post:
      operationId: ingestChunks
      summary: Ingest content chunks into the knowledge base
      tags: [Ingestion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequestInput"
      responses:
        "200":
          description: Ingestion result with counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/ingest/sources:
    get:
      operationId: listIngestSources
      summary: List ingestion sources for a project
      tags: [Ingestion]
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of ingestion sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IngestSource"
        "400":
          description: Missing project_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ingest/sources/{id}:
    get:
      operationId: getIngestSource
      summary: Get a single ingestion source
      tags: [Ingestion]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Source details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestSource"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteIngestSource
      summary: Delete an ingestion source and its chunks
      tags: [Ingestion]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Source deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/ingest/reingest/{id}:
    post:
      operationId: reingestSource
      summary: Trigger re-ingestion of a source (client must re-send chunks)
      tags: [Ingestion]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Re-ingestion instructions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sourceId:
                    type: string
                    format: uuid
                  status:
                    type: string
                  message:
                    type: string
                required: [sourceId, status, message]
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Radar ───────────────────────────────────────────────────────────────────

  /api/radar/watchlist:
    get:
      operationId: listRadarWatchlist
      summary: List radar watchlist items (filter by kind or tag)
      tags: [Radar]
      parameters:
        - name: kind
          in: query
          schema:
            type: string
            enum: [repo, dependency, technology]
        - name: tag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Array of watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RadarWatchItem"
    post:
      operationId: createRadarWatchItem
      summary: Add an item to the radar watchlist
      tags: [Radar]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RadarWatchItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadarWatchItem"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/radar/watchlist/{id}:
    put:
      operationId: updateRadarWatchItem
      summary: Update a watchlist item
      tags: [Radar]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RadarWatchItemInput"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadarWatchItem"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRadarWatchItem
      summary: Delete a watchlist item
      tags: [Radar]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/radar/scan:
    post:
      operationId: triggerRadarScan
      summary: Trigger a radar scan for watchlist items
      tags: [Radar]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RadarScanTriggerInput"
      responses:
        "200":
          description: Scan started
          content:
            application/json:
              schema:
                type: object
                properties:
                  scanRunId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [started]
                required: [scanRunId, status]
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/radar/scans:
    get:
      operationId: listRadarScans
      summary: List recent scan history
      tags: [Radar]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Array of scan runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RadarScanRun"

  /api/radar/scans/{runId}:
    get:
      operationId: getRadarScanResults
      summary: Get results for a specific scan run
      tags: [Radar]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadarScanResults"

  /api/radar/digest/latest:
    get:
      operationId: getLatestRadarDigest
      summary: Get the latest radar digest
      tags: [Radar]
      responses:
        "200":
          description: Latest digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadarDigest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/radar/digest/{runId}:
    get:
      operationId: getRadarDigest
      summary: Get radar digest for a specific scan run
      tags: [Radar]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadarDigest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/radar/ingest:
    post:
      operationId: ingestRadarDigest
      summary: Ingest radar scan digest into memory as knowledge
      tags: [Radar]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RadarIngestInput"
      responses:
        "200":
          description: Ingestion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  memoriesCreated:
                    type: integer
                required: [ok, memoriesCreated]
        "400":
          $ref: "#/components/responses/ValidationError"

  # ── Pipelines ───────────────────────────────────────────────────────────────

  /api/pipelines:
    post:
      operationId: createPipelineRun
      summary: Create a new pipeline run
      tags: [Pipelines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineRunCreateInput"
      responses:
        "201":
          description: Pipeline run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"
        "400":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listPipelineRuns
      summary: List pipeline runs (filter by type, status, project)
      tags: [Pipelines]
      parameters:
        - name: pipeline_type
          in: query
          schema:
            type: string
            enum: [quick, md-feature, dispatch, pre-pr, review]
        - name: status
          in: query
          schema:
            type: string
            enum: [running, completed, failed, cancelled, resuming]
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Array of pipeline runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineRun"

  /api/pipelines/latest:
    get:
      operationId: getLatestPipelineRun
      summary: Get the most recent pipeline run (optionally by type)
      tags: [Pipelines]
      parameters:
        - name: pipeline_type
          in: query
          schema:
            type: string
            enum: [quick, md-feature, dispatch, pre-pr, review]
      responses:
        "200":
          description: Latest pipeline run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/pipelines/{runId}:
    get:
      operationId: getPipelineRun
      summary: Get a pipeline run with summary
      tags: [Pipelines]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pipeline run with summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunSummary"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updatePipelineRun
      summary: Update pipeline run status/phase/state
      tags: [Pipelines]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineRunUpdateInput"
      responses:
        "200":
          description: Updated pipeline run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/pipelines/{runId}/checkpoints:
    post:
      operationId: addPipelineCheckpoint
      summary: Add a checkpoint to a pipeline run
      tags: [Pipelines]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineCheckpointInput"
      responses:
        "201":
          description: Checkpoint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineCheckpoint"
        "400":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listPipelineCheckpoints
      summary: List all checkpoints for a pipeline run
