          type: integer
      required: [bucket]

    # ── Ingestion ─────────────────────────────────────────────────────────────

    IngestChunk:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 50000
        category:
          type: string
          minLength: 1
          maxLength: 100
        importance:
          type: number
          minimum: 0
          maximum: 10
        filePath:
          type: string
        chunkIndex:
          type: integer
          minimum: 0
      required: [content]

    IngestRequestInput:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        sourceType:
          type: string
          enum: [github_repo, local_path, url, raw_text]
        sourceUri:
          type: string
          minLength: 1
          maxLength: 2000
        displayName:
          type: string
          maxLength: 200
        contentHash:
          type: string
          maxLength: 128
        chunks:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/IngestChunk"
        totalChunks:
          type: integer
          minimum: 1
        config:
          type: object
          properties:
            dedupThreshold:
              type: number
              minimum: 0
              maximum: 1
              default: 0.92
            autoCategory:
              type: boolean
              default: true
      required: [projectId, sourceType, sourceUri, chunks]

    IngestResult:
      type: object
      properties:
        sourceId:
          type: string
          format: uuid
        stored:
          type: integer
        duplicates:
          type: integer
        status:
          type: string
      required: [sourceId, stored]

    IngestSource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source_type:
          type: string
        source_uri:
          type: string
        display_name:
          type: string
        status:
          type: string
        chunk_count:
          type: integer
        created_at:
          type: string
          format: date-time
      required: [id, project_id, source_type, source_uri]

    # ── Radar ─────────────────────────────────────────────────────────────────

    RadarWatchItemInput:
      type: object
      properties:
        slug:
          type: string
          minLength: 1
          maxLength: 200
        kind:
          type: string
          enum: [repo, dependency, technology]
        name:
          type: string
          minLength: 1
          maxLength: 200
        sourceUrl:
          type: string
          format: uri
        relevance:
          type: string
          maxLength: 500
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          default: []
        metadata:
          type: object
          additionalProperties: true
          default: {}
      required: [slug, kind, name]

    RadarWatchItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        kind:
          type: string
        name:
          type: string
        source_url:
          type: string
        relevance:
          type: string
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
      required: [id, slug, kind, name]

    RadarScanTriggerInput:
      type: object
      properties:
        itemIds:
          type: array
          items:
            type: string
            format: uuid
        sinceDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 30

    RadarIngestInput:
      type: object
      properties:
        scanRunId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
      required: [scanRunId, projectId]

    RadarScanRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        items_scanned:
          type: integer
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      required: [id, status]

    RadarScanResults:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        results:
          type: array
          items:
            type: object
            additionalProperties: true
      required: [id, status]

    RadarDigest:
      type: object
      properties:
        scan_run_id:
          type: string
          format: uuid
        digest:
          type: string
        created_at:
          type: string
          format: date-time
      required: [scan_run_id, digest]

    # ── Pipelines ─────────────────────────────────────────────────────────────

    PipelineRunCreateInput:
      type: object
      properties:
        pipelineType:
          type: string
          enum: [quick, md-feature, dispatch, pre-pr, review]
        projectId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        config:
          type: object
          additionalProperties: true
          default: {}
        initialState:
          type: object
          additionalProperties: true
          default: {}
        metadata:
          type: object
          additionalProperties: true
          default: {}
      required: [pipelineType]

    PipelineRunUpdateInput:
      type: object
      properties:
        status:
          type: string
          enum: [running, completed, failed, cancelled, resuming]
        currentPhase:
          type: string
          maxLength: 100
        state:
          type: object
          additionalProperties: true
        error:
          type: string
          maxLength: 10000

    PipelineCheckpointInput:
      type: object
      properties:
        phase:
          type: string
          minLength: 1
          maxLength: 100
        phaseIndex:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [completed, failed, skipped]
          default: completed
        stateBefore:
          type: object
          additionalProperties: true
          default: {}
        stateAfter:
          type: object
          additionalProperties: true
          default: {}
        output:
          type: object
          additionalProperties: true
          default: {}
        error:
          type: string
          maxLength: 10000
        durationMs:
          type: integer
          minimum: 0
        metadata:
          type: object
          additionalProperties: true
          default: {}
      required: [phase, phaseIndex]

    PipelineResumeInput:
      type: object
      properties:
        fromPhase:
          type: string
          maxLength: 100
        stateOverrides:
          type: object
          additionalProperties: true
          default: {}

    PipelineRoutingRuleInput:
      type: object
      properties:
        pipelineType:
          type: string
          minLength: 1
          maxLength: 50
        sourcePhase:
          type: string
          minLength: 1
          maxLength: 100
        condition:
          type: string
          enum: [on_failure, on_success, on_skip, always]
        targetAction:
          type: string
          minLength: 1
          maxLength: 100
        config:
          type: object
          additionalProperties: true
          default: {}
        priority:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
        enabled:
          type: boolean
          default: true
      required: [pipelineType, sourcePhase, condition, targetAction]

    PipelineRouteEvalInput:
      type: object
      properties:
        failedPhase:
          type: string
          minLength: 1
          maxLength: 100
      required: [failedPhase]

    PipelineRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pipeline_type:
          type: string
        status:
          type: string
        current_phase:
          type: string
        project_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        config:
          type: object
          additionalProperties: true
        state:
          type: object
          additionalProperties: true
        initial_state:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, pipeline_type, status, created_at]

    PipelineRunSummary:
      type: object
      description: Pipeline run with embedded checkpoint count and latest phase info
      allOf:
        - $ref: "#/components/schemas/PipelineRun"
        - type: object
          properties:
            checkpoint_count:
              type: integer
            latest_checkpoint_phase:
              type: string

    PipelineCheckpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        phase:
          type: string
        phase_index:
          type: integer
        status:
          type: string
        state_before:
          type: object
          additionalProperties: true
        state_after:
          type: object
          additionalProperties: true
        output:
          type: object
          additionalProperties: true
        error:
          type: string
        duration_ms:
          type: integer
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required: [id, run_id, phase, phase_index, status, created_at]

    PipelineRoutingRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pipeline_type:
          type: string
        source_phase:
          type: string
        condition:
          type: string
        target_action:
          type: string
        config:
          type: object
          additionalProperties: true
        priority:
          type: integer
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
      required: [id, pipeline_type, source_phase, condition, target_action]

    PipelineRouteResult:
      type: object
      properties:
        action:
          type: string
        message:
          type: string
        config:
          type: object
          additionalProperties: true

    # ── Companies ─────────────────────────────────────────────────────────────

    CompanyCreateInput:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        slug:
          type: string
          minLength: 1
          maxLength: 50
          pattern: "^[a-z0-9-]+$"
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        priority:
          type: integer
          minimum: 0
          maximum: 99
          default: 5
        budget:
          type: object
          properties:
            daily_usd:
              type: number
              minimum: 0
              default: 5
            monthly_usd:
              type: number
              minimum: 0
              default: 150
            spent_today_usd:
              type: number
              minimum: 0
              default: 0
        schedule:
          type: object
          properties:
            active_hours:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 23
              minItems: 2
              maxItems: 2
              default: [8, 22]
            timezone:
              type: string
              maxLength: 50
              default: Europe/Paris
            days:
              type: array
              items:
                type: integer
                minimum: 1
                maximum: 7
              default: [1, 2, 3, 4, 5, 6, 7]
        config:
          type: object
          additionalProperties: true
          default: {}
      required: [projectId, slug, displayName]

    CompanyUpdateInput:
      type: object
      properties:
        status:
          type: string
          enum: [active, paused, archived]
        priority:
          type: integer
          minimum: 0
          maximum: 99
        budget:
          type: object
          additionalProperties: true
        schedule:
          type: object
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        displayName:
          type: string
          minLength: 1
          maxLength: 200

    Company:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        slug:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum: [active, paused, archived]
        priority:
          type: integer
        budget:
          type: object
          additionalProperties: true
        schedule:
          type: object
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, project_id, slug, display_name, status]

    CompanyStatus:
      type: object
      description: Company with enriched status data (heartbeat, task counts)
      allOf:
        - $ref: "#/components/schemas/Company"
        - type: object
          properties:
            last_heartbeat:
              type: string
              format: date-time
            pending_tasks:
              type: integer
            running_tasks:
              type: integer

    # ── Task Queue ────────────────────────────────────────────────────────────

    TaskCreateInput:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          maxLength: 10000
        source:
          type: string
          enum: [backlog, autopilot, manual, cross_company]
          default: manual
        priority:
          type: integer
          minimum: 0
          maximum: 99
          default: 5
        parentId:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true
          default: {}
      required: [companyId, title]

    TaskUpdateInput:
      type: object
      properties:
        status:
          type: string
          enum: [pending, claimed, running, blocked, completed, failed, cancelled]
        result:
          type: object
          additionalProperties: true
        blockingQuestionIds:
          type: array
          items:
            type: string
            format: uuid
        pipelineRunId:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true

    TaskClaimInput:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
      required: [companyId, sessionId]

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, claimed, running, blocked, completed, failed, cancelled]
        source:
          type: string
        priority:
          type: integer
        parent_id:
          type: string
          format: uuid
        pipeline_run_id:
          type: string
          format: uuid
        result:
          type: object
          additionalProperties: true
        blocking_question_ids:
          type: array
          items:
            type: string
            format: uuid
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, company_id, title, status, created_at]

    # ── Decision Queue ────────────────────────────────────────────────────────

    DecisionCreateInput:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        pipelineRunId:
          type: string
          format: uuid
        tier:
          type: integer
          minimum: 1
          maximum: 3
        question:
          type: string
          minLength: 1
          maxLength: 5000
        options:
          type: object
          additionalProperties: true
        context:
          type: string
          maxLength: 10000
        metadata:
          type: object
          additionalProperties: true
          default: {}
      required: [companyId, tier, question]

    DecisionAnswerInput:
      type: object
      properties:
        answer:
          type: string
          minLength: 1
          maxLength: 10000
        answeredBy:
          type: string
          minLength: 1
          maxLength: 200
      required: [answer, answeredBy]

    Decision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        pipeline_run_id:
          type: string
          format: uuid
        tier:
          type: integer
        question:
          type: string
        options:
          type: object
          additionalProperties: true
        context:
          type: string
        answer:
          type: string
        answered_by:
          type: string
        answered_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required: [id, company_id, tier, question, created_at]

    # ── Orchestrator ──────────────────────────────────────────────────────────

    OrchestratorStatus:
      type: object
      properties:
        overview:
          type: object
          additionalProperties: true
        activeCompanies:
          type: array
          items:
            $ref: "#/components/schemas/Company"
        pendingDecisions:
          type: array
          items:
            $ref: "#/components/schemas/Decision"
        staleCompanies:
          type: array
          items:
            $ref: "#/components/schemas/StaleCompany"
        packageLocks:
          type: array
          items:
            $ref: "#/components/schemas/PackageLock"
        timestamp:
          type: string
          format: date-time
      required: [overview, activeCompanies, pendingDecisions, staleCompanies, packageLocks, timestamp]

    StaleCompany:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        display_name:
          type: string
        last_heartbeat:
          type: string
          format: date-time
        minutes_stale:
          type: number
      required: [id, slug]

    ReadyCompany:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        display_name:
          type: string
        pending_task_count:
          type: integer
      required: [id, slug, pending_task_count]

    HeartbeatResult:
      type: object
      properties:
        ok:
          type: boolean
        budgetExceeded:
          type: boolean
        spentToday:
          type: number
        dailyBudget:
          type: number
      required: [ok]

    DailyReport:
      type: object
      properties:
        date:
          type: string
          format: date
        companies:
          type: array
          items:
            type: object
            additionalProperties: true
        summary:
          type: object
          additionalProperties: true
      required: [date]

    BoardOverview:
      type: object
      properties:
        companies:
          type: array
          items:
            type: object
            additionalProperties: true
        timestamp:
          type: string
          format: date-time

    DispatcherQueueItem:
      type: object
      properties:
        company_id:
          type: string
          format: uuid
        company_slug:
          type: string
        task_id:
          type: string
          format: uuid
        task_title:
          type: string
        priority:
          type: integer
      required: [company_id, task_id, task_title]

    # ── Package Locks ─────────────────────────────────────────────────────────

    PackageLockInput:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        packageName:
          type: string
          minLength: 1
          maxLength: 100
        sessionId:
          type: string
          format: uuid
      required: [companyId, packageName, sessionId]

    PackageUnlockInput:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        packageName:
          type: string
          minLength: 1
          maxLength: 100
      required: [companyId, packageName]

    PackageLock:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        package_name:
          type: string
        session_id:
          type: string
          format: uuid
        acquired_at:
          type: string
          format: date-time
      required: [id, company_id, package_name, session_id]

    # ── Audit Log ─────────────────────────────────────────────────────────────

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        actor:
          type: string
        action:
          type: string
        target_type:
          type: string
        target_id:
          type: string
        before_state:
          type: object
          additionalProperties: true
        after_state:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required: [id, actor, action, created_at]

    # ── Session Transcripts ───────────────────────────────────────────────────

    SessionTranscriptCreateInput:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        sessionId:
          type: string
          minLength: 1
          maxLength: 200
        companySlug:
          type: string
          minLength: 1
          maxLength: 50
        taskTitle:
          type: string
          minLength: 1
          maxLength: 500
        projectPath:
          type: string
          maxLength: 500
        summary:
          type: string
          maxLength: 50000
        planOutput:
          type: string
          maxLength: 100000
        filesChanged:
          type: array
          items:
            type: string
            maxLength: 500
          default: []
        testResults:
          type: string
          maxLength: 50000
        prsCreated:
          type: array
          items:
            type: string
            maxLength: 500
          default: []
        decisions:
          type: array
          items:
            type: object
            additionalProperties: true
          default: []
        errors:
          type: array
          items:
            type: string
            maxLength: 5000
          default: []
        phase:
          type: string
          enum: [plan, implement, review, blocked, completed, failed]
          default: completed
        durationMinutes:
          type: integer
          minimum: 0
        contextPct:
          type: integer
          minimum: 0
          maximum: 100
        compactionCount:
          type: integer
          minimum: 0
        rawLog:
          type: string
          maxLength: 500000
      required: [companyId, sessionId, companySlug, taskTitle]

    SessionTranscript:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        session_id:
          type: string
        company_slug:
          type: string
        task_title:
          type: string
        project_path:
          type: string
        summary:
          type: string
        plan_output:
          type: string
        files_changed:
          type: array
          items:
            type: string
        test_results:
          type: string
        prs_created:
          type: array
          items:
            type: string
        decisions:
          type: array
          items:
            type: object
            additionalProperties: true
        errors:
          type: array
          items:
            type: string
        phase:
          type: string
        duration_minutes:
          type: integer
        context_pct:
          type: integer
        compaction_count:
          type: integer
        raw_log:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, company_id, session_id, company_slug, task_title, created_at]

    # ── Company Heartbeat (input) ─────────────────────────────────────────────

    CompanyHeartbeatInput:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        data:
          type: object
          additionalProperties: true
          default: {}
      required: [companyId, sessionId]

    # ── Admin ─────────────────────────────────────────────────────────────────

    BackupStatus:
      type: object
      properties:
        database:
          type: object
          properties:
            memories:
              type: integer
            events:
              type: integer
            chats:
              type: integer
            agents:
              type: integer
            sessions:
              type: integer
            decisions:
              type: integer
            git_events:
              type: integer
            metrics:
              type: integer
          required: [memories, events, chats, agents, sessions, decisions, git_events, metrics]
        backupScript:
          type: string
        restoreScript:
          type: string
        backupDir:
          type: string
        retentionDays:
          type: integer
        timestamp:
          type: string
          format: date-time
      required: [database, timestamp]
