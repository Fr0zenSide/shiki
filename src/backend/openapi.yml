          format: uuid
        session_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        role:
          type: string
        content:
          type: string
        token_count:
          type: integer
        metadata:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
      required: [id, session_id, project_id, role, content, occurred_at]

