# ─────────────────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────────────────
components:

  responses:
    ValidationError:
      description: Request body failed Zod validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    # ── Common ────────────────────────────────────────────────────────────────

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
      required: [ok]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ── Health ────────────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        uptime:
          type: object
          properties:
            ms:
              type: integer
            human:
              type: string
          required: [ms, human]
        services:
          type: object
          properties:
            database:
              type: object
              properties:
                connected:
                  type: boolean
                pool:
                  type: object
                  additionalProperties: true
              required: [connected]
            ollama:
              type: object
              properties:
                connected:
                  type: boolean
              required: [connected]
            websocket:
              type: object
              additionalProperties: true
          required: [database, ollama, websocket]
        timestamp:
          type: string
          format: date-time
      required: [status, version, uptime, services, timestamp]

    HealthFullResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        uptime:
          type: object
          properties:
            ms:
              type: integer
            human:
              type: string
          required: [ms, human]
        services:
          type: object
          properties:
            database:
              type: boolean
            embeddings:
              type: boolean
          required: [database, embeddings]
        memory:
          type: object
          properties:
            total:
              type: integer
            withEmbedding:
              type: integer
            categories:
              type: object
              additionalProperties:
                type: integer
            sources:
              type: integer
          required: [total, withEmbedding, categories, sources]
        pipelines:
          type: object
          properties:
            total:
              type: integer
            running:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
          required: [total, running, completed, failed]
        projects:
          type: integer
        radar:
          type: object
          properties:
            watchedRepos:
              type: integer
          required: [watchedRepos]
        orchestrator:
          type: object
          properties:
            companies:
              type: integer
            pendingTasks:
              type: integer
            pendingDecisions:
              type: integer
          required: [companies, pendingTasks, pendingDecisions]
        agents:
          type: array
          items:
            type: object
            properties:
              handle:
                type: string
              alias:
                type: string
              role:
                type: string
            required: [handle, alias, role]
        commands:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              desc:
                type: string
            required: [name, desc]
        timestamp:
          type: string
          format: date-time
      required: [status, version, uptime, services, memory, pipelines, projects, radar, orchestrator, agents, commands, timestamp]

    # ── Domain Entities ───────────────────────────────────────────────────────

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id]

    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
        started_at:
          type: string
          format: date-time
      required: [id]

    ActiveSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        hours_active:
          type: number
      required: [id]

    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
        spawned_at:
          type: string
          format: date-time
      required: [id]

    # ── Agent Events (input / stored) ─────────────────────────────────────────

    AgentEventInput:
      type: object
      properties:
        agentId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        eventType:
          type: string
          minLength: 1
          maxLength: 100
        payload:
          type: object
          additionalProperties: true
          default: {}
        progressPct:
          type: integer
          minimum: 0
          maximum: 100
        message:
          type: string
          maxLength: 10000
      required: [agentId, sessionId, projectId, eventType]

    AgentEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        event_type:
          type: string
        payload:
          type: object
