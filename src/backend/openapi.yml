          maxLength: 200
          default: main
        metadata:
          type: object
          additionalProperties: true
          default: {}
      required: [projectId, prUrl, title, branch]

    GitEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        event_type:
          type: string
        ref:
          type: string
        commit_msg:
          type: string
        metadata:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
      required: [id, event_type, occurred_at]

    # ── Dashboard ─────────────────────────────────────────────────────────────

    DashboardSummary:
      type: object
