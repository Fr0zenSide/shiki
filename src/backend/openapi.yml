          format: uuid
        project_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        content:
          type: string
        category:
          type: string
        importance:
          type: number
        created_at:
          type: string
          format: date-time
      required: [id, content, created_at]

    MemorySearchInput:
